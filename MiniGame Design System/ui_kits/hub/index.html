<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>MiniGame — Hub UI Kit</title>
<meta name="viewport" content="width=1440"/>
<link rel="stylesheet" href="hub.css"/>
<link rel="icon" type="image/svg+xml" href="../../assets/logomark.svg"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="GameCard.jsx"></script>
<script type="text/babel" src="RightRail.jsx"></script>
<script type="text/babel" src="KnightTour.jsx"></script>
<script type="text/babel" src="EightQueens.jsx"></script>
<script type="text/babel" src="LightsOut.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const [view, setView] = React.useState("home"); // "home" | "knight" | "queens" | "lights" | "cube"

  function openGame(id) { setView(id); window.scrollTo({ top: 0, behavior: "smooth" }); }

  return (
    <div className="mg-app">
      <NavBar/>
      <main className="mg-app__main">
        <Sidebar current={view === "home" ? "home" : "games"} onNav={(id) => setView(id === "home" ? "home" : view)}/>

        {view === "home" && (
          <div className="mg-content">
            <div className="mg-content__main">
              <Hero onPlay={() => openGame("knight")}/>

              <section className="mg-section">
                <div className="mg-section__head">
                  <h2>Featured Games</h2>
                  <a className="mg-section__view">View All Games <IChevron size={14}/></a>
                </div>
                <div className="mg-games">
                  {GAMES.map(g => (
                    <GameCard key={g.id} game={g} onPlay={() => openGame(g.id)}/>
                  ))}
                </div>
              </section>

              <FeatureStrip/>
            </div>

            <aside className="mg-rail">
              <ProgressCard/>
              <StreakCard/>
              <DailyChallenge onPlay={() => openGame("knight")}/>
            </aside>
          </div>
        )}

        {view === "knight" && <div style={{gridColumn:"1 / -1"}}>
          <div className="mg-backbar" onClick={() => setView("home")}><IBack size={14}/>Back to hub</div>
          <KnightTour onBack={() => setView("home")}/>
        </div>}
        {view === "queens" && <div style={{gridColumn:"1 / -1"}}>
          <div className="mg-backbar" onClick={() => setView("home")}><IBack size={14}/>Back to hub</div>
          <EightQueens onBack={() => setView("home")}/>
        </div>}
        {view === "lights" && <div style={{gridColumn:"1 / -1"}}>
          <div className="mg-backbar" onClick={() => setView("home")}><IBack size={14}/>Back to hub</div>
          <LightsOut onBack={() => setView("home")}/>
        </div>}
        {view === "cube" && <div style={{gridColumn:"1 / -1"}}>
          <div className="mg-backbar" onClick={() => setView("home")}><IBack size={14}/>Back to hub</div>
          <section className="mg-game" style={{minHeight:480, alignItems:"center", justifyContent:"center"}}>
            <div style={{textAlign:"center", padding:80}}>
              <div style={{fontSize:80, marginBottom:16, filter:"drop-shadow(0 16px 30px rgba(239,68,68,.5))"}}>🎲</div>
              <h2 className="mg-h2" style={{margin:"0 0 8px"}}>Cube Puzzle</h2>
              <p className="mg-body" style={{margin:"0 0 20px"}}>Play surface — not yet wired in this kit.</p>
              <button className="mg-btn mg-btn--primary" onClick={() => setView("home")}><IBack size={14}/>Back to hub</button>
            </div>
          </section>
        </div>}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
