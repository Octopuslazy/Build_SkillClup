<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--mg-bg-1);color:var(--mg-text-1);font-family:var(--mg-font-ui);padding:24px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .tile{background:var(--mg-surface-1);border:1px solid var(--mg-border);border-radius:16px;padding:24px;display:flex;align-items:center;justify-content:center;height:120px;}
  .dark{background:#0B1020;}
  .light{background:#F8FAFC;}
  .grad{background:var(--mg-grad-hero);}
  img{height:48px;width:auto;}
  .l-meta{position:absolute;top:8px;left:12px;font:var(--mg-eyebrow);text-transform:uppercase;letter-spacing:.14em;color:var(--mg-text-3);}
  .tile{position:relative;}
</style></head>
<body>
<div class="grid">
  <div class="tile dark"><span class="l-meta">On dark</span><img src="../assets/logo.svg" alt=""/></div>
  <div class="tile" style="background:var(--mg-surface-1)"><span class="l-meta">On card</span><img src="../assets/logo.svg" alt=""/></div>
  <div class="tile grad"><span class="l-meta" style="color:rgba(255,255,255,.85)">On gradient</span><img src="../assets/logomark.svg" alt="" style="height:56px;"/></div>
  <div class="tile light"><span class="l-meta" style="color:#475569">On light (rare)</span><img src="../assets/logo.svg" alt="" style="filter:invert(.92) hue-rotate(180deg) saturate(1.3)"/></div>
</div>
</body></html>
