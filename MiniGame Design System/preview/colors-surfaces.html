<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--mg-bg-1);color:var(--mg-text-1);font-family:var(--mg-font-ui);}
  .wrap{padding:24px;display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  .sw{border-radius:14px;overflow:hidden;border:1px solid var(--mg-border);background:var(--mg-surface-1);}
  .chip{aspect-ratio:1.2/1;display:block;}
  .meta{padding:10px 12px;display:flex;flex-direction:column;gap:2px;}
  .name{font:var(--mg-body-sm);color:var(--mg-text-1);}
  .hex{font:var(--mg-mono);color:var(--mg-text-3);font-size:11px;}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:#0B1020"></div><div class="meta"><span class="name">bg-0 void</span><span class="hex">#0B1020</span></div></div>
  <div class="sw"><div class="chip" style="background:#0F172A"></div><div class="meta"><span class="name">bg-1 page</span><span class="hex">#0F172A</span></div></div>
  <div class="sw"><div class="chip" style="background:#131C31"></div><div class="meta"><span class="name">bg-2 raised</span><span class="hex">#131C31</span></div></div>
  <div class="sw"><div class="chip" style="background:#1E293B"></div><div class="meta"><span class="name">surface-1 card</span><span class="hex">#1E293B</span></div></div>
  <div class="sw"><div class="chip" style="background:#243149"></div><div class="meta"><span class="name">surface-2 hover</span><span class="hex">#243149</span></div></div>
</div></body></html>
