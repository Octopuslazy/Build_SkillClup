<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--mg-bg-1);color:var(--mg-text-1);font-family:var(--mg-font-ui);padding:20px;}
  .stack{display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;align-items:center;gap:14px;}
  .lbl{font:var(--mg-eyebrow);text-transform:uppercase;letter-spacing:.14em;color:var(--mg-text-3);width:140px;flex:0 0 140px;}
  .bar{flex:1;height:10px;background:var(--mg-surface-2);border-radius:999px;overflow:hidden;position:relative;border:1px solid var(--mg-border);}
  .fill{height:100%;border-radius:999px;background:var(--mg-grad-primary);box-shadow:0 0 16px rgba(99,102,241,.45);}
  .val{font:var(--mg-mono);color:var(--mg-text-2);font-size:12px;width:80px;text-align:right;}
  .ring{width:80px;height:80px;border-radius:999px;background:conic-gradient(#6366F1 0% 78%, #243149 78% 100%);position:relative;display:flex;align-items:center;justify-content:center;}
  .ring::after{content:"";position:absolute;inset:8px;background:var(--mg-surface-1);border-radius:999px;}
  .ring span{position:relative;z-index:1;font:700 18px var(--mg-font-mono);color:var(--mg-text-1);}
  .row2{display:flex;align-items:center;gap:18px;}
  .stats{display:flex;flex-direction:column;gap:4px;}
  .stats .t{font:var(--mg-meta);color:var(--mg-text-3);}
  .stats .n{font:700 20px var(--mg-font-mono);color:var(--mg-text-1);}
</style></head>
<body>
<div class="stack">
  <div class="row"><span class="lbl">Knight Tour</span><div class="bar"><div class="fill" style="width:80%"></div></div><span class="val">20/25</span></div>
  <div class="row"><span class="lbl">8 Queens</span><div class="bar"><div class="fill" style="width:55%"></div></div><span class="val">11/20</span></div>
  <div class="row"><span class="lbl">Lights Out</span><div class="bar"><div class="fill" style="width:32%"></div></div><span class="val">8/25</span></div>
  <div class="row2">
    <div class="ring"><span>78%</span></div>
    <div class="stats"><span class="t">Overall progress</span><span class="n">128 puzzles solved</span></div>
  </div>
</div>
</body></html>
