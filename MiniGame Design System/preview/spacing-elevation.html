<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--mg-bg-1);color:var(--mg-text-1);font-family:var(--mg-font-ui);padding:24px;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .card{background:var(--mg-surface-1);border:1px solid var(--mg-border);border-radius:16px;padding:18px;display:flex;flex-direction:column;gap:10px;height:140px;justify-content:space-between;}
  .lbl{font:var(--mg-eyebrow);text-transform:uppercase;letter-spacing:.14em;color:var(--mg-text-3);}
  .val{font:var(--mg-mono);font-size:11px;color:var(--mg-text-2);line-height:1.5;}
  .rest{box-shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 8px 24px -12px rgba(0,0,0,.6);}
  .glow{box-shadow:0 0 0 1px rgba(99,102,241,.45), 0 14px 40px -10px rgba(99,102,241,.6); border-color:#6366F1;}
  .pop{box-shadow:0 24px 60px -20px rgba(0,0,0,.6), 0 8px 16px -8px rgba(0,0,0,.4);}
</style></head>
<body>
<div class="grid">
  <div class="card rest"><span class="lbl">Card · Rest</span><span class="val">0 1px 0 #fff/4 inset,<br>0 8px 24px -12px #000/.6</span></div>
  <div class="card glow"><span class="lbl">Card · Hover Glow</span><span class="val">0 0 0 1px #6366F1/.45,<br>0 14px 40px -10px #6366F1/.6</span></div>
  <div class="card pop"><span class="lbl">Modal / Pop</span><span class="val">0 24px 60px -20px #000/.6,<br>0 8px 16px -8px #000/.4</span></div>
</div>
</body></html>
