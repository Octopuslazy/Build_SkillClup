<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--mg-bg-1);color:var(--mg-text-1);font-family:var(--mg-font-ui);padding:24px;}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;}
  .step{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:84px;height:84px;background:var(--mg-surface-2);border:1px solid var(--mg-border);}
  .name{font:var(--mg-meta);color:var(--mg-text-2);}
  .tag{font:var(--mg-mono);color:var(--mg-text-3);font-size:10px;}
</style></head>
<body>
<div class="grid">
  <div class="step"><div class="box" style="border-radius:6px"></div><span class="name">xs</span><span class="tag">6px</span></div>
  <div class="step"><div class="box" style="border-radius:8px"></div><span class="name">sm</span><span class="tag">8px</span></div>
  <div class="step"><div class="box" style="border-radius:12px"></div><span class="name">md</span><span class="tag">12px</span></div>
  <div class="step"><div class="box" style="border-radius:16px"></div><span class="name">lg · card</span><span class="tag">16px</span></div>
  <div class="step"><div class="box" style="border-radius:20px"></div><span class="name">xl · panel</span><span class="tag">20px</span></div>
  <div class="step"><div class="box" style="border-radius:999px;width:140px;height:48px"></div><span class="name">pill</span><span class="tag">999px</span></div>
</div>
</body></html>
