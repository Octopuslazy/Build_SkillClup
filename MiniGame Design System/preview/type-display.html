<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--mg-bg-1);color:var(--mg-text-1);font-family:var(--mg-font-ui);padding:24px;}
  .row{display:flex;flex-direction:column;gap:18px;}
  .spec{display:flex;align-items:baseline;gap:18px;padding-bottom:12px;border-bottom:1px solid var(--mg-border);}
  .spec:last-child{border-bottom:none;}
  .label{flex:0 0 120px;font:var(--mg-mono);color:var(--mg-text-3);font-size:11px;}
  .sample{flex:1;color:var(--mg-text-1);letter-spacing:-0.02em;}
</style></head>
<body>
<div class="row">
  <div class="spec"><span class="label">h1 · 44/700</span><span class="sample" style="font:var(--mg-h1)">Train Your Brain</span></div>
  <div class="spec"><span class="label">h2 · 32/700</span><span class="sample" style="font:var(--mg-h2)">Featured Games</span></div>
  <div class="spec"><span class="label">h3 · 24/600</span><span class="sample" style="font:var(--mg-h3)">Daily Challenge</span></div>
  <div class="spec"><span class="label">h4 · 18/600</span><span class="sample" style="font:var(--mg-h4)">Knight Tour</span></div>
</div>
</body></html>
