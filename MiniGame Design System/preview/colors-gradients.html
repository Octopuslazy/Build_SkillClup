<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--mg-bg-1);color:var(--mg-text-1);font-family:var(--mg-font-ui);}
  .wrap{padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .card{border-radius:16px;overflow:hidden;border:1px solid var(--mg-border);background:var(--mg-surface-1);}
  .swatch{height:90px;display:flex;align-items:flex-end;padding:12px;color:white;font:var(--mg-eyebrow);letter-spacing:.16em;}
  .meta{padding:10px 14px;display:flex;flex-direction:column;gap:2px;}
  .name{font:var(--mg-body-sm);color:var(--mg-text-1);}
  .hex{font:var(--mg-mono);color:var(--mg-text-3);font-size:11px;}
</style></head>
<body><div class="wrap">
  <div class="card"><div class="swatch" style="background:linear-gradient(135deg,#4F46E5 0%,#6366F1 35%,#22D3EE 100%)">HERO GRADIENT</div><div class="meta"><span class="name">--mg-grad-hero</span><span class="hex">#4F46E5 → #6366F1 → #22D3EE</span></div></div>
  <div class="card"><div class="swatch" style="background:linear-gradient(135deg,#6366F1 0%,#818CF8 100%)">PRIMARY GRADIENT</div><div class="meta"><span class="name">--mg-grad-primary</span><span class="hex">#6366F1 → #818CF8</span></div></div>
  <div class="card"><div class="swatch" style="background:linear-gradient(135deg,#06B6D4 0%,#22D3EE 100%);color:#0F172A">ACCENT GRADIENT</div><div class="meta"><span class="name">--mg-grad-accent</span><span class="hex">#06B6D4 → #22D3EE</span></div></div>
  <div class="card"><div class="swatch" style="background:radial-gradient(120% 80% at 50% 0%, rgba(99,102,241,.5) 0%, rgba(99,102,241,0) 60%), #1E293B">CARD GLOW</div><div class="meta"><span class="name">--mg-grad-card-glow</span><span class="hex">radial indigo · used on hover</span></div></div>
</div></body></html>
