<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--mg-bg-1);color:var(--mg-text-1);font-family:var(--mg-font-ui);padding:24px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .card{position:relative;background:var(--mg-surface-1);border:1px solid var(--mg-border);border-radius:18px;padding:14px;display:flex;flex-direction:column;gap:10px;overflow:hidden;box-shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 8px 24px -12px rgba(0,0,0,.6);}
  .card.hover{border-color:#6366F1;box-shadow:0 0 0 1px rgba(99,102,241,.45), 0 16px 40px -12px rgba(99,102,241,.55);transform:translateY(-2px);}
  .thumb{aspect-ratio:1.4/1;border-radius:12px;background:radial-gradient(120% 100% at 50% 0%, rgba(99,102,241,.35), transparent 60%), linear-gradient(180deg,#1B2440,#0F172A);position:relative;display:flex;align-items:center;justify-content:center;color:#A5B4FC;}
  .thumb .icon{font-size:46px;filter:drop-shadow(0 6px 18px rgba(99,102,241,.6));}
  .title{font:600 15px var(--mg-font-display);color:var(--mg-text-1);}
  .sub{font:var(--mg-meta);color:var(--mg-text-3);}
  .meta{display:flex;align-items:center;justify-content:space-between;}
  .pill{font:600 10px/1 var(--mg-font-ui);padding:5px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.1em;}
  .hard{background:rgba(239,68,68,.16);color:#FCA5A5;border:1px solid rgba(239,68,68,.35);}
  .easy{background:rgba(34,197,94,.16);color:#86EFAC;border:1px solid rgba(34,197,94,.35);}
  .stars{font:var(--mg-mono);color:var(--mg-text-2);font-size:12px;}
  .play{background:var(--mg-grad-primary);color:white;border:none;border-radius:999px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 20px -6px rgba(99,102,241,.7);}
  .label-hot{position:absolute;top:10px;left:10px;background:linear-gradient(135deg,#EF4444,#F97316);color:white;font:700 9px var(--mg-font-ui);letter-spacing:.18em;padding:4px 8px;border-radius:6px;}
</style></head>
<body>
<div class="grid">
  <div class="card hover">
    <span class="label-hot">HOT</span>
    <div class="thumb"><div class="icon">♞</div></div>
    <div class="title">Knight Tour</div>
    <div class="sub">Find the knight's path</div>
    <div class="meta">
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="pill hard">Hard</span>
        <span class="stars">★ 4.8 · 1.2K</span>
      </div>
      <button class="play">▶</button>
    </div>
  </div>
  <div class="card">
    <div class="thumb"><div class="icon">⛀</div></div>
    <div class="title">Lights Out</div>
    <div class="sub">Turn off all the lights</div>
    <div class="meta">
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="pill easy">Easy</span>
        <span class="stars">★ 4.6 · 864</span>
      </div>
      <button class="play">▶</button>
    </div>
  </div>
</div>
</body></html>
