<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--mg-bg-1);color:var(--mg-text-1);font-family:var(--mg-font-ui);padding:24px;}
  .row{display:flex;flex-direction:column;gap:14px;}
  .spec{display:flex;align-items:baseline;gap:18px;padding-bottom:10px;border-bottom:1px solid var(--mg-border);}
  .spec:last-child{border-bottom:none;}
  .label{flex:0 0 140px;font:var(--mg-mono);color:var(--mg-text-3);font-size:11px;}
  .sample{flex:1;}
</style></head>
<body>
<div class="row">
  <div class="spec"><span class="label">title · 16/600</span><span class="sample" style="font:var(--mg-title)">Move History</span></div>
  <div class="spec"><span class="label">body · 14/500</span><span class="sample" style="font:var(--mg-body);color:var(--mg-text-2)">Challenge yourself. Improve your skills. Become a logic master.</span></div>
  <div class="spec"><span class="label">body-sm · 13/500</span><span class="sample" style="font:var(--mg-body-sm);color:var(--mg-text-2)">Find the knight's path across all squares.</span></div>
  <div class="spec"><span class="label">meta · 12/500</span><span class="sample" style="font:var(--mg-meta);color:var(--mg-text-3)">8×8 · Hard · 4.8★ · 1.2K plays</span></div>
  <div class="spec"><span class="label">eyebrow · 11/600</span><span class="sample" style="font:var(--mg-eyebrow);color:var(--mg-text-3);text-transform:uppercase;letter-spacing:.14em">KNIGHT TOUR</span></div>
</div>
</body></html>
