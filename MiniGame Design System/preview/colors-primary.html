<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--mg-bg-1);color:var(--mg-text-1);font-family:var(--mg-font-ui);}
  .wrap{padding:24px;display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  .sw{border-radius:14px;overflow:hidden;border:1px solid var(--mg-border);background:var(--mg-surface-1);}
  .chip{aspect-ratio:1.2/1;display:block;}
  .meta{padding:10px 12px;display:flex;flex-direction:column;gap:2px;}
  .name{font:var(--mg-body-sm);color:var(--mg-text-1);}
  .hex{font:var(--mg-mono);color:var(--mg-text-3);font-size:11px;}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:#A5B4FC"></div><div class="meta"><span class="name">primary-300</span><span class="hex">#A5B4FC</span></div></div>
  <div class="sw"><div class="chip" style="background:#818CF8"></div><div class="meta"><span class="name">primary-400</span><span class="hex">#818CF8</span></div></div>
  <div class="sw" style="outline:2px solid #6366F1;outline-offset:-2px"><div class="chip" style="background:#6366F1"></div><div class="meta"><span class="name">primary-500 ★</span><span class="hex">#6366F1</span></div></div>
  <div class="sw"><div class="chip" style="background:#4F46E5"></div><div class="meta"><span class="name">primary-600</span><span class="hex">#4F46E5</span></div></div>
  <div class="sw"><div class="chip" style="background:#4338CA"></div><div class="meta"><span class="name">primary-700</span><span class="hex">#4338CA</span></div></div>
</div></body></html>
