<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--mg-bg-1);color:var(--mg-text-1);font-family:var(--mg-font-ui);padding:24px;}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;align-items:end;}
  .step{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .box{background:linear-gradient(135deg,#6366F1,#22D3EE);border-radius:8px;width:100%;box-shadow:0 6px 18px -10px rgba(99,102,241,.7);}
  .tag{font:var(--mg-mono);color:var(--mg-text-3);font-size:10px;}
  .name{font:var(--mg-meta);color:var(--mg-text-2);font-size:11px;}
</style></head>
<body>
<div class="grid">
  <div class="step"><div class="box" style="height:4px"></div><span class="name">1</span><span class="tag">4px</span></div>
  <div class="step"><div class="box" style="height:8px"></div><span class="name">2</span><span class="tag">8px</span></div>
  <div class="step"><div class="box" style="height:12px"></div><span class="name">3</span><span class="tag">12px</span></div>
  <div class="step"><div class="box" style="height:16px"></div><span class="name">4</span><span class="tag">16px</span></div>
  <div class="step"><div class="box" style="height:24px"></div><span class="name">6</span><span class="tag">24px</span></div>
  <div class="step"><div class="box" style="height:32px"></div><span class="name">8</span><span class="tag">32px</span></div>
  <div class="step"><div class="box" style="height:48px"></div><span class="name">12</span><span class="tag">48px</span></div>
  <div class="step"><div class="box" style="height:64px"></div><span class="name">16</span><span class="tag">64px</span></div>
</div>
</body></html>
